name: Build & Release Standalone Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Standalone Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: ai-pack-linux-x86_64
            executable_path: dist/ai-pack-linux-x86_64
          - os: macos-latest
            asset_name: ai-pack-macos-arm64
            executable_path: dist/ai-pack-macos-arm64
          - os: windows-latest
            asset_name: ai-pack-windows-x86_64.exe
            executable_path: dist/ai-pack-windows-x86_64.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Build Dependencies & Package
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .

      - name: Build Executable with PyInstaller
        shell: bash
        run: |
          python -c 'with open("run_entry.py", "w") as f: f.write("from ai_pack.cli import main\nif __name__ == \"__main__\":\n    main()\n")'
          pyinstaller --onefile --name "${{ matrix.asset_name }}" --paths src run_entry.py

      - name: Upload Binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.executable_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
